version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: realestate-postgres
    environment:
      POSTGRES_DB: realestate_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realestate-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: realestate-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realestate-network

  # Elasticsearch for Full-Text Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: realestate-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - realestate-network

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: realestate-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: realestate_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-key-change-in-production
      GEO_SERVICE_URL: http://geo-service:8001
      ELASTICSEARCH_HOST: elasticsearch:9200
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - realestate-network
    command: npm run start:dev

  # Python Geospatial Service
  geo-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.geospatial
    container_name: realestate-geo-service
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: realestate_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '8001:8001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/geo-services:/app
    networks:
      - realestate-network
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  # Martin Vector Tile Server
  martin:
    image: mbtiles.io/martin:latest
    container_name: realestate-tiles
    environment:
      DATABASE_URL: 'postgresql://postgres:postgres@postgres:5432/realestate_dev'
    ports:
      - '3856:3856'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - realestate-network

  # PgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: realestate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@realestate.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - realestate-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: realestate-nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./devops/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - realestate-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  realestate-network:
    driver: bridge
